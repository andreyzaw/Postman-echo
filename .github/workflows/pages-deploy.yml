name: Deploy Allure Report to GitHub Pages

on:
  workflow_run:
    workflows: ["Test and Publish Allure Report"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write

    # ⭐ ЭТО КЛЮЧЕВАЯ ЧАСТЬ - добавляем environment ⭐
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
          fail-if-not-exists: false

      - name: Create gh-pages branch if not exists
        run: |
          if [ ! -d gh-pages/.git ]; then
            git clone --depth 1 https://github.com/${{ github.repository }} temp-repo
            cd temp-repo
            git checkout --orphan gh-pages
            git rm -rf .
            echo "<html><body><h1>Allure Reports</h1><p>Reports will appear here</p></body></html>" > index.html
            git add index.html
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git commit -m "Initial gh-pages branch"
            git push origin gh-pages
            cd ..
            rm -rf temp-repo
            git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create index.html if not exists
        run: |
          if [ ! -f gh-pages/index.html ]; then
            echo "<html><head><title>Allure Reports</title></head><body>" > gh-pages/index.html
            echo "<h1>Allure Test Reports</h1>" >> gh-pages/index.html
            echo "<p><a href='./'>Latest Report</a></p>" >> gh-pages/index.html
            echo "</body></html>" >> gh-pages/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4