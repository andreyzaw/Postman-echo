name: Test and Publish Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install allure -y

      - name: Run tests with Allure
        run: |
          pytest test_echo.py --alluredir=allure-results --clean-alluredir

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v5
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: .
          keep_files: false

      - name: Get report URL
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          REPO_NAME=${{ github.repository }}
          REPO_NAME_LOWER=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          echo "📊 Allure Report published at: https://${REPO_NAME_LOWER%/*}.github.io/${REPO_NAME_LOWER#*/}"
          echo "Report URL: https://${REPO_NAME_LOWER%/*}.github.io/${REPO_NAME_LOWER#*/}"