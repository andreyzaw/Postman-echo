name: Scheduled Tests with Allure Report

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  scheduled-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install allure -y

      - name: Run tests with Allure
        run: |
          pytest test_echo.py --alluredir=allure-results --clean-alluredir

      - name: Generate Allure Report with timestamp
        run: |
          allure generate allure-results -o allure-report-${{ github.run_number }} --clean
          echo "REPORT_DIR=allure-report-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Upload report with timestamp
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: ${{ env.REPORT_DIR }}
          retention-days: 90

      - name: Update latest report symlink
        run: |
          rm -rf allure-report-latest
          ln -s ${{ env.REPORT_DIR }} allure-report-latest

      - name: Deploy to GitHub Pages (scheduled)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report-latest
          publish_branch: gh-pages
          destination_dir: scheduled/${{ github.run_number }}
          keep_files: true

      - name: Create index for scheduled reports
        run: |
          echo "<html><body><h1>Scheduled Test Reports</h1><ul>" > index.html
          echo "<li><a href='scheduled/${{ github.run_number }}/'>Report #${{ github.run_number }} (${{ github.run_id }})</a></li>" >> index.html
          echo "</ul></body></html>" >> index.html

      - name: Deploy index
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true